# 1. Identity
sonar.projectKey=my-python-security-demo
sonar.projectName=Security Demo Project

# 2. Source Configuration (CRITICAL: This ensures your files are indexed)
sonar.sources=.
sonar.inclusions=vulnerable_app.py,app.py,processor.py
sonar.python.version=3.11

# 3. Test Configuration
sonar.tests=.
sonar.test.inclusions=test_*.py

# 4. Security & Coverage
# We force the exclusion of coverage for the demo so you only see Security
sonar.coverage.exclusions=**/*
sonar.sourceEncoding=UTF-8

# 5. SCM Settings (Helps Sonar identify "New" vs "Old" code)
sonar.scm.provider=git
